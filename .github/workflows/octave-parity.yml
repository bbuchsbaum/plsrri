name: Octave Parity

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  octave-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y octave

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('remotes','testthat'), repos='https://cloud.r-project.org')"
          Rscript -e "remotes::install_local('.', dependencies = TRUE, upgrade = 'never')"

      - name: Run Octave parity tests
        run: |
          Rscript -e "library(testthat); library(plsrri); test_file('tests/testthat/test-matlab-octave-parity-core.R'); test_file('tests/testthat/test-matlab-fixtures-splithalf.R'); test_file('tests/testthat/test-matlab-fixtures-analysis.R'); test_file('tests/testthat/test-matlab-fixtures-missing.R'); test_file('tests/testthat/test-matlab-fixtures-parameters.R')"
